defaultNamespace: cattle-neuvector-system
helm:
  chart: neuvector
  repo: https://charts.rancher.io
  version: "109.0.1+up2.8.13"
  valuesFiles:
    - values.yaml
overrideTargets:
  - clusterSelector:
      matchLabels:
        needs-security: "true"
dependsOn:
  - selector:
      matchLabels:
        provides: neuvector-crd
  - name: suse-security-security-crd 
#  - selector:
#      matchLabels:
#        provides: longhorn
labels:
  provides: neuvector

