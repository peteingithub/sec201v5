defaultNamespace: cattle-neuvector-system
helm:
  chart: neuvector
  repo: https://charts.rancher.io
  version: "109.0.1+up2.8.13"
  valuesFiles:
    - values.yaml
targets:
  - clusterSelector:
      matchLabels:
        needs-security: "true"
dependsOn:
  - name: security-with-storage-security-crd        
  - name: security-with-storage-storage-longhorn-app
labels:
  provides: neuvector
diff:
  comparePatches:
  - apiVersion: coordination.k8s.io/v1
    kind: Lease
    operations:
    - {"op": "remove", "path": "/spec/leaseTransitions"}
  - apiVersion: v1
    kind: Secret
    name: neuvector-internal-certs
    operations:
    - {"op": "remove", "path": "/"} # This stops the "WaitApplied" hang

