defaultNamespace: cattle-neuvector-system
helm:
  chart: neuvector
  repo: https://charts.rancher.io
  version: "109.0.1+up2.8.13"
  valuesFiles:
    - values.yaml
overrideTargets:
  - clusterSelector:
      matchLabels:
        needs-security: "true"
dependsOn:
  - selector:
      matchLabels:
        provides: neuvector-crd
  - name: suse-security-security-crd 
  - name: suse-security-storage-longhorn-app
#  - selector:
#      matchLabels:
#        provides: longhorn
labels:
  provides: neuvector
diff:
  comparePatches:
  - apiVersion: coordination.k8s.io/v1
    kind: Lease
    operations:
    - {"op": "remove", "path": "/spec/leaseTransitions"}
#  - apiVersion: batch/v1
#    kind: CronJob
#    name: neuvector-cert-upgrader-pod
#    operations:
#    - {"op": "remove", "path": "/metadata/annotations/cert-upgrader-uid"}
  - apiVersion: v1
    kind: Secret
    name: neuvector-internal-certs
    operations:
    - {"op": "remove", "path": "/"} # This tells Fleet to ignore the whole object
