registry: registry.rancher.com

# Links the app into the Rancher UI catalog
labels:
  catalog.cattle.io/cluster-repo-name: rancher-charts

rancher:
  enabled: true

manager:
  ingress:
    enabled: true
    tls: false
    host: cplane-1.example.com
  svc:
    type: ClusterIP  # Traefik (K3s default) will route to this via the Ingress above

k3s:
  enabled: true
  runtimePath: /run/k3s/containerd/containerd.sock

controller:
  replicas: 1
  prime:
    enabled: true
  pvc:
    enabled: true
    storageClassName: longhorn
  sso:
    enabled: true
  
  # This section activates the Rancher RBAC handshake
  configmap:
    enabled: true
    data:
      sysinitcfg.yaml: |
        New_Service_Profile_Baseline: basic
        Auth_By_Platform: true
        Cluster_Name: k3s-security
        Scan_Config:
          Auto_Scan: true

cve:
  scanner:
    enabled: true
    replicas: 1

