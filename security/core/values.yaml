global:
  cattle:
    url: https://rancher.example.com

registry: registry.rancher.com

bootstrapPassword: "P4ssword"

labels:
  catalog.cattle.io/cluster-repo-name: rancher-charts

rancher:
  enabled: true

manager:
  # Disabling ingress to avoid port 80 conflicts with ServiceLB
  ingress:
    enabled: false 
  svc:
    type: LoadBalancer

k3s:
  enabled: true
  runtimePath: /run/k3s/containerd/containerd.sock

controller:
  replicas: 1
##  resources:
##    limits:
##      cpu: 2000m
##      memory: 2Gi
##    requests:
##      cpu: 100m
##      memory: 256Mi 
  prime:
    enabled: true
  pvc:
    enabled: true
    storageClassName: longhorn
  sso:
    enabled: true
  hostAliases:
    - ip: "172.30.2.11" 
      hostnames:
        - "rancher.example.com"
  env:
    - name: CTRL_SYSTEM_DEBUG_SKIP_CERT_VALIDATION
      value: "true"
    - name: CTRL_SYSTEM_DEBUG_SHOW_OIDC
      value: "true"
#  secret:
#    enabled: true
#    data:
#      admin_password: P4ssword
  
  # This section fixes the "RBAC Disabled" error by forcing NeuVector 
  # to trust the Rancher platform for authentication.
  configmap:
    enabled: true
    data:
      sysinitcfg.yaml: |
        New_Service_Profile_Baseline: basic
        Auth_By_Platform: true
        Always_Use_Local_Admin: true
        Cluster_Name: Production
        Scan_Config:
          Auto_Scan: true

cve:
  scanner:
    enabled: true
    replicas: 1


